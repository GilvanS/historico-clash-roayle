                .intel-alerts-box {{ display: flex; flex-direction: column; gap: 8px; }}
                .intel-alert {{ font-size: 0.85em; padding: 8px 12px; border-radius: 6px; border-left: 3px solid transparent; }}

                .copy-deck-btn {{

                    font-weight: bold;
