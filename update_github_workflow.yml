name: Zip Automático e Consolidação

on:
  schedule:
    # Executa diariamente às 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Permite execução manual

jobs:
  zip-and-consolidate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Instalar dependências
      run: pip install pandas
      
    - name: Executar Zip Automático (arquivos > 2 dias)
      run: python src/auto_zip_daily.py
      
    - name: Executar Consolidador (uma vez)
      run: python src/csv_consolidator.py
      
    - name: Commit das mudanças
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --staged --quiet || git commit -m "chore: zip automático e consolidação de arquivos"
        git push