name: Update Clash Royale Analytics

on:
  # Roda uma vez por dia as 05:00 UTC (02:00 BRT) para atualizacao completa
  schedule:
    - cron: '0 5 * * *'
  
  # Permite execucao manual
  workflow_dispatch:
  
  # Roda a cada push no main (exceto commits do proprio workflow de coleta)
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

# Apenas uma execucao por vez para evitar conflitos de deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests
    
    - name: Pull latest changes (inclui dados coletados a cada 30min)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull origin main --rebase -X theirs || true

    # ── 1. Coleta de dados (100% CSV - sem banco de dados) ─────────────
    - name: Fetch latest battles and save to CSV
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        cd src
        python collect_battles_csv.py

    # ── 2. Limpeza de dados ────────────────────────────────────────────
    - name: Data Integrity Cleanup (Sanitize & Deduplicate)
      run: |
        cd src
        echo "Limpando conflitos de merge e duplicatas..."
        python sanitize_csvs.py
        python deduplicate_csvs.py

    # ── 3. Geracao da pagina web (le diretamente dos CSVs atualizados) ─
    - name: Generate HTML reports (index, clan, members)
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        cd src
        python html_generator.py
        python clan_generator.py
        python member_generator.py

    # ── 4. Atualiza README ─────────────────────────────────────────────
    - name: Update README with battle statistics
      env:
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        python src/update_readme_from_csv.py --csv-dir src --readme README.md

    # ── 5. Commit e push ───────────────────────────────────────────────
    - name: Commit and push all changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        git add src/data_csv_oficial/ docs/index.html docs/clan.html docs/member_*.html README.md

        if ! git diff --staged --quiet; then
          git commit -m "update: relatorio diario completo $(date -u +'%Y-%m-%d %H:%M UTC')"

          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push feito com sucesso"
              break
            else
              echo "Tentativa $i/3 falhou, aguardando..."
              sleep 5
              git pull --rebase -X theirs origin main || true
            fi
          done
        else
          echo "Nenhuma mudanca para commitar"
        fi

    - name: Copy assets to docs
      run: |
        cp -r cards docs/
        if [ -d "assets" ]; then
          cp -r assets/* docs/
        fi

    - name: Upload artifacts for Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-data
    continue-on-error: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Check deployment status
        if: failure()
        run: |
          echo "⚠️ GitHub Pages deployment failed. This is normal if GitHub Pages is not enabled."
          echo "To enable: Go to https://github.com/${{ github.repository }}/settings/pages"
          echo "Under 'Source', select 'GitHub Actions' and save."