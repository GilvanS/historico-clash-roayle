name: Clash Royale Sync (Inteligente)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'clan.html'
      - 'index.html'
      - 'member_*.html'
      - 'src/data_clan/**'
      - 'src/data_csv_oficial/**'
      - 'src/data_chests/**'
  schedule:
    # ---------------------------------------------------------------------------------
    # Agendamento de Contingência (Backup da Nuvem)
    # Roda a cada 3 horas (00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC)
    # Isso reduz drasticamente o consumo de minutos do GitHub Actions.
    # ---------------------------------------------------------------------------------
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests python-dotenv

    - name: SINCRONIZACAO COMPLETA (Pipeline Unico)
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
        CR_PLAYER_TAG_SEC: ${{ secrets.CR_PLAYER_TAG_SEC }}
        CR_CLAN_TAG: ${{ secrets.CR_CLAN_TAG }}
        CR_CLAN_TAG_SEC: ${{ secrets.CR_CLAN_TAG_SEC }}
      run: |
        cd src
        python main_sync.py

    - name: Commit & Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        git add src/data_clan/ src/data_csv_oficial/ README.md index.html clan.html member_*.html

        if ! git diff --staged --quiet; then
          HTML_SIZE=$(wc -c < index.html)
          MIN_SIZE=500000
          if [ "$HTML_SIZE" -lt "$MIN_SIZE" ]; then
            echo "AVISO: HTML parece truncado ($HTML_SIZE bytes < $MIN_SIZE). Regenerando..."
            cd src
            python main_sync.py
            cd ..
            git add index.html clan.html member_*.html
          fi

          git commit -m "chore: sincronizacao automatica Clash Royale $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"

          for i in 1 2 3; do
            if git push origin HEAD; then
              echo "Push realizado com sucesso."
              break
            else
              echo "Tentativa $i/3 falhou, realizando rebase..."
              sleep 5
              git pull --rebase -X theirs origin main || true
            fi
          done
        else
          echo "Nenhuma alteracao detectada nesta rodada."
        fi