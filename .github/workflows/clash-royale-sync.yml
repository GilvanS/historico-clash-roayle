name: Clash Royale Sync (30min)

# Workflow unificado: Coleta -> Analytics (README) -> Dashboard (HTML)
# Executa a cada 30 minutos para manter o histórico atualizado e a página web sincronizada.

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install requests python-dotenv google-genai

    - name: 🔍 Debug Segredos (Teste de Variáveis)
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
        CR_PLAYER_TAG_SEC: ${{ secrets.CR_PLAYER_TAG_SEC }}
      run: |
        echo "=== DEBUG: Verificando Secrets ==="
        echo "CR_PLAYER_TAG_SEC existe: ${{ secrets.CR_PLAYER_TAG_SEC != '' }}"
        if [ -n "$CR_PLAYER_TAG_SEC" ]; then
          echo "CR_PLAYER_TAG_SEC valor: $CR_PLAYER_TAG_SEC"
        else
          echo "ERRO: CR_PLAYER_TAG_SEC está vazio!"
        fi
        echo "================================="
        cd src
        python test_env.py

    - name: 1. Rodar Pipeline de Sincronização (Coleta -> README -> HTML)
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
        CR_PLAYER_TAG_SEC: ${{ secrets.CR_PLAYER_TAG_SEC }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd src
        python main_sync.py

    - name: 2. Commit & Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Verifica se há trabalho local pendente (travamento)
        if [ -f .actions_paused ]; then
          echo "⏸️ Trabalho em progresso detectado. Pulando sincronização automática."
          echo "Sincronização ignorada via flag .actions_paused"
          exit 0
        fi

        # Adiciona arquivos CSV oficiais, README e Dashboard (index, clan e membros)
        git add src/data_csv_oficial/ README.md index.html clan.html member_*.html

        # Verifica se há diferenças reais (não só timestamps)
        if git diff --staged --quiet; then
          echo "✨ Nenhuma alteração detectada nesta rodada."
        else
          # Verifica se há mudanças significativas (não só timestamps)
          CHANGES=$(git diff --staged --stat)
          echo "Alterações detectadas:"
          echo "$CHANGES"
          
          git commit -m "chore: sincronização automática Clash Royale $(date -u +'%Y-%m-%d %H:%M UTC')"
          
          # Retry logic para evitar falhas por concorrência
          for i in 1 2 3; do
            if git push origin HEAD; then
              echo "✅ Push realizado com sucesso."
              break
            else
              echo "⚠️ Tentativa $i/3 falhou, realizando rebase..."
              sleep 5
              git pull --rebase -X theirs origin main || true
            fi
          done
        fi
