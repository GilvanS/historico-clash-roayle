name: Clash Royale Sync (30min)

# Workflow unificado: Coleta -> Analytics (README) -> Dashboard (HTML)
# Executa a cada 30 minutos para manter o histórico atualizado e a página web sincronizada.

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: 🔍 Debug Segredos (Teste de Variáveis)
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        cd src
        python test_env.py

    - name: 1. Rodar Pipeline de Sincronização (Coleta -> README -> HTML)
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        cd src
        python main_sync.py

    - name: 2. Commit & Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Adiciona arquivos CSV oficiais, README e Dashboard
        git add src/data_csv_oficial/ README.md docs/index.html

        if ! git diff --staged --quiet; then
          git commit -m "chore: sincronização automática Clash Royale $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          
          # Retry logic para evitar falhas por concorrência
          for i in 1 2 3; do
            if git push origin HEAD; then
              echo "✅ Push realizado com sucesso."
              break
            else
              echo "⚠️ Tentativa $i/3 falhou, realizando rebase..."
              sleep 5
              git pull --rebase -X theirs origin main || true
            fi
          done
        else
          echo "✨ Nenhuma alteração detectada nesta rodada."
        fi
