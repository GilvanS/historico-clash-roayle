name: Clash Royale Sync (Inteligente)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'clan.html'
      - 'index.html'
      - 'member_*.html'
      - 'src/data_clan/**'
      - 'src/data_csv_oficial/**'
      - 'src/data_chests/**'
  schedule:
    # ---------------------------------------------------------------------------------
    # Agendamento Inteligente e Variado (Backup da Nuvem)
    # Durante a madrugada (00h00 às 08h00 BRT / 03:00 às 11:00 UTC)
    # Segue intervalos irregulares: 30m, 1h, 45m, para não perder batalhas asiáticas
    # ---------------------------------------------------------------------------------
    - cron: '0 3 * * *'    # 00:00 BRT
    - cron: '30 3 * * *'   # 00:30 BRT (+30m)
    - cron: '30 4 * * *'   # 01:30 BRT (+1h)
    - cron: '15 5 * * *'   # 02:15 BRT (+45m)
    - cron: '45 5 * * *'   # 02:45 BRT (+30m)
    - cron: '45 6 * * *'   # 03:45 BRT (+1h)
    - cron: '30 7 * * *'   # 04:30 BRT (+45m)
    - cron: '0 8 * * *'    # 05:00 BRT (+30m)
    - cron: '0 9 * * *'    # 06:00 BRT (+1h)
    - cron: '45 9 * * *'   # 06:45 BRT (+45m)
    - cron: '15 10 * * *'  # 07:15 BRT (+30m)
    - cron: '15 11 * * *'  # 08:15 BRT (+1h)

    # ---------------------------------------------------------------------------------
    # Durante o dia (08h00 às 23h59 BRT), o script .bat roda no PC,
    # então o GitHub Actions atua só de 3 em 3 horas por segurança.
    # ---------------------------------------------------------------------------------
    - cron: '0 14 * * *'   # 11:00 BRT
    - cron: '0 17 * * *'   # 14:00 BRT
    - cron: '0 20 * * *'   # 17:00 BRT
    - cron: '0 23 * * *'   # 20:00 BRT
    - cron: '0 2 * * *'    # 23:00 BRT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests python-dotenv

    - name: SINCRONIZACAO COMPLETA (Pipeline Unico)
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
        CR_PLAYER_TAG_SEC: ${{ secrets.CR_PLAYER_TAG_SEC }}
        CR_CLAN_TAG: ${{ secrets.CR_CLAN_TAG }}
        CR_CLAN_TAG_SEC: ${{ secrets.CR_CLAN_TAG_SEC }}
      run: |
        cd src
        python main_sync.py

    - name: Commit & Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        git add src/data_clan/ src/data_csv_oficial/ README.md docs/

        if ! git diff --staged --quiet; then
          HTML_SIZE=$(wc -c < docs/index.html)
          MIN_SIZE=500000
          if [ "$HTML_SIZE" -lt "$MIN_SIZE" ]; then
            echo "AVISO: HTML parece truncado ($HTML_SIZE bytes < $MIN_SIZE). Regenerando..."
            cd src
            python main_sync.py
            cd ..
            git add docs/
          fi

          git commit -m "chore: sincronizacao automatica Clash Royale $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"

          for i in 1 2 3; do
            if git push origin HEAD; then
              echo "Push realizado com sucesso."
              break
            else
              echo "Tentativa $i/3 falhou, realizando rebase..."
              sleep 5
              git pull --rebase -X theirs origin main || true
            fi
          done
        else
          echo "Nenhuma alteracao detectada nesta rodada."
        fi