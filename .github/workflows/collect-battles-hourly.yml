name: Collect Battles (Every 30min)

# Coleta batalhas da API a cada 30 minutos (100% CSV - sem banco de dados).
# A API retorna apenas as ~25 batalhas mais recentes.
# Coleta frequente evita perda de batalhas quando o jogador joga muitas partidas seguidas.
# Commit usa [skip ci] para nao disparar o workflow diario de atualizacao.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite execucao manual para testes e depuracao

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Fetch battles and save to CSV
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        cd src
        python collect_battles_csv.py

    - name: Data Integrity Cleanup (Sanitize & Deduplicate)
      run: |
        cd src
        echo "Limpando conflitos de merge..."
        python sanitize_csvs.py
        echo "Removendo duplicatas..."
        python deduplicate_csvs.py

    - name: Generate HTML report (atualiza pagina web com batalhas novas)
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        cd src
        python html_generator.py

    - name: Verify Today's Data
      id: verify
      run: |
        DATA_HOJE=$(date +'%Y%m%d')
        ARQUIVO="src/data_csv_oficial/oponentes_dia_$DATA_HOJE.csv"
        if [ -f "$ARQUIVO" ]; then
          COUNT=$(tail -n +2 "$ARQUIVO" | wc -l)
          echo "STATUS=✅ Coletado: $COUNT batalhas encontradas para hoje." >> $GITHUB_OUTPUT
          echo "FOUND=true" >> $GITHUB_OUTPUT
        else
          echo "STATUS=⚠️ Alerta: Arquivo de hoje nao encontrado ainda." >> $GITHUB_OUTPUT
          echo "FOUND=false" >> $GITHUB_OUTPUT
        fi

    - name: Post Job Summary
      run: |
        echo "### 📊 Status da Coleta Automatica" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.verify.outputs.STATUS }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Hora da Coleta:** $(date -u +'%H:%M UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- **Integridade:** Sanitizacao e Deduplicacao executadas ✅" >> $GITHUB_STEP_SUMMARY

    - name: Commit collected data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        git add src/data_csv_oficial/ docs/index.html

        if ! git diff --staged --quiet; then
          git commit -m "chore: coleta horaria de batalhas $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"

          for i in 1 2 3; do
            if git push origin HEAD; then
              echo "Push feito com sucesso"
              break
            else
              echo "Tentativa $i/3 falhou, aguardando..."
              sleep 5
              git pull --rebase -X theirs origin main || true
            fi
          done
        else
          echo "Nenhuma batalha nova encontrada nesta coleta"
        fi
