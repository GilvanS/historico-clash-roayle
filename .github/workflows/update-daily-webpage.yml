name: Update Web Page (Daily 23h BRT)

# Atualizacao completa diaria: coleta + README + pagina web
# Executa as 23:00 BRT (02:00 UTC) e tambem a cada push no main

on:
  schedule:
    # 02:00 UTC = 23:00 BRT (UTC-3)
    - cron: '0 2 * * *'

  # Executa em cada push no main (ex: quando voce comitar alteracoes no projeto)
  push:
    branches: [ main ]

  # Permite execucao manual pela interface do GitHub Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-full:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Pull latest changes (inclui dados das coletas de 30min)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull origin main --rebase -X theirs || true

    # ── 1. Coleta de dados (100% CSV - sem banco de dados) ─────────────
    - name: Fetch latest battles and save to CSV
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        cd src
        python collect_battles_csv.py

    # ── 2. Limpeza de dados ────────────────────────────────────────────
    - name: Data Integrity Cleanup (Sanitize & Deduplicate)
      run: |
        cd src
        python sanitize_csvs.py
        python deduplicate_csvs.py

    # ── 3. Geracao do HTML (le os CSVs direto, sem banco) ─────────────
    - name: Generate HTML report
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
      run: |
        cd src
        python html_generator.py

    # ── 4. Atualiza README ─────────────────────────────────────────────
    - name: Update README with deck statistics from latest CSV
      run: |
        python src/update_readme_from_csv.py --csv-dir src --readme README.md

    # ── 5. Commit e push ────────────────────────────────────────────────
    - name: Commit and push all changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        git add src/data_csv_oficial/ docs/index.html README.md

        if ! git diff --staged --quiet; then
          git commit -m "update: relatorio diario completo $(date -u +'%Y-%m-%d %H:%M UTC')"

          for i in 1 2 3; do
            if git push origin HEAD; then
              echo "Push feito com sucesso"
              break
            else
              echo "Tentativa $i/3 falhou, aguardando..."
              sleep 5
              git pull --rebase -X theirs origin main || true
            fi
          done
        else
          echo "Nenhuma mudanca para commitar"
        fi

    # ── 6. Resumo ───────────────────────────────────────────────────────
    - name: Show summary
      run: |
        echo "## Relatorio Diario Atualizado" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- \`src/data_csv_oficial/oponentes_dia_*.csv\` - Batalhas do dia" >> $GITHUB_STEP_SUMMARY
        echo "- \`src/data_csv_oficial/oponentes_mes_*.csv\` - Batalhas do mes" >> $GITHUB_STEP_SUMMARY
        echo "- \`src/data_csv_oficial/oponentes_ano_*.csv\` - Batalhas do ano" >> $GITHUB_STEP_SUMMARY
        echo "- \`docs/index.html\` - Pagina web atualizada" >> $GITHUB_STEP_SUMMARY
        echo "- \`README.md\` - Estatisticas atualizadas" >> $GITHUB_STEP_SUMMARY
