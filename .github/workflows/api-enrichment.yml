name: API Data Enrichment

on:
  schedule:
    # Executa diariamente às 03:00 UTC (meia-noite Horário de Brasília)
    - cron: '0 3 * * *'
  workflow_dispatch:  # Permite execução manual

jobs:
  enrich-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Instalar dependências
      run: pip install pandas requests
      
    - name: Executar Enriquecimento de Dados
      env:
        CLASH_ROYALE_API_KEY: ${{ secrets.CLASH_ROYALE_API_KEY }}
        PLAYER_TAG: ${{ secrets.PLAYER_TAG }}
      run: python src/api_enricher_github.py
      
    - name: Commit e Push das alterações
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add src/data_csv_oficial/oponentes_ano_2026.csv
        git diff --staged --quiet || git commit -m "feat: dados enriquecidos com informações de cartas e elixir"
        git push