name: Clash Royale - Batalhas

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  battles:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests python-dotenv

    - name: Coletar Batalhas e Atualizar Dashboard
      env:
        CR_API_TOKEN: ${{ secrets.CR_API_TOKEN }}
        CR_PLAYER_TAG: ${{ secrets.CR_PLAYER_TAG }}
        CR_PLAYER_TAG_SEC: ${{ secrets.CR_PLAYER_TAG_SEC }}
      run: |
        cd src
        python main_sync.py --mode battles

    - name: Commit & Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        git add src/data_csv_oficial/ src/data_clan/status_barcos_*.csv README.md index.html clan.html member_*.html

        if ! git diff --staged --quiet; then
          git commit -m "chore: batalhas atualizadas $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push origin HEAD || git pull --rebase -X theirs origin main && git push origin HEAD
        fi